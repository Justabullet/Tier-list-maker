<script>
let draggedRow = null;

function setupTierDrag() {
  const table = document.getElementById("tierTable");

  document.querySelectorAll(".rank").forEach(rank => {
    rank.draggable = true;

    rank.addEventListener("dragstart", (e) => {
      draggedRow = rank.closest("tr");
      e.dataTransfer.effectAllowed = "move";
      draggedRow.style.opacity = "0.5";
    });

    rank.addEventListener("dragend", () => {
      if (draggedRow) draggedRow.style.opacity = "1";
      draggedRow = null;
    });
  });

  table.addEventListener("dragover", (e) => {
    if (!draggedRow) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
  });

  table.addEventListener("drop", (e) => {
    if (!draggedRow) return;
    e.preventDefault();

    const targetRow = e.target.closest("tr");
    if (!targetRow || targetRow === draggedRow) return;

    const tbody = table.querySelector("tbody");

    const rows = Array.from(tbody.children);
    const draggedIndex = rows.indexOf(draggedRow);
    const targetIndex = rows.indexOf(targetRow);

    if (draggedIndex < targetIndex) {
      tbody.insertBefore(draggedRow, targetRow.nextSibling);
    } else {
      tbody.insertBefore(draggedRow, targetRow);
    }
  });
}
</script>
<script>
/* -------------------- DRAG & DROP -------------------- */

function setupDragAndDrop() {
  const draggables = document.querySelectorAll("img[draggable='true']");
  const dropzones = document.querySelectorAll(".dropzone");

  draggables.forEach(img => {
    img.addEventListener("dragstart", () => {
      img.classList.add("dragging");
    });

    img.addEventListener("dragend", () => {
      img.classList.remove("dragging");
    });
  });

  dropzones.forEach(zone => {
    zone.addEventListener("dragover", e => {
      e.preventDefault();
      zone.classList.add("dragover");
      const dragging = document.querySelector(".dragging");
      if (dragging) zone.appendChild(dragging);
    });

    zone.addEventListener("dragleave", () => {
      zone.classList.remove("dragover");
    });

    zone.addEventListener("drop", () => {
      zone.classList.remove("dragover");
    });
  });
}

/* -------------------- ДОБАВЛЕНИЕ ТИРА -------------------- */

function addTier() {
  const nameInput = document.getElementById("tierName");
  const colorInput = document.getElementById("tierColor");
  const table = document.getElementById("tierTable");

  const tierName = nameInput.value.trim();
  const tierColor = colorInput.value;

  if (!tierName) {
    alert("Введите название тира");
    return;
  }

  // создаём строку
  const row = document.createElement("tr");
  row.height = 100;

  // левая ячейка (название)
  const rankCell = document.createElement("td");
  rankCell.className = "rank";
  rankCell.textContent = tierName;
  rankCell.style.background = tierColor;

  // правая ячейка (dropzone)
  const itemsCell = document.createElement("td");
  const dropDiv = document.createElement("div");
  dropDiv.className = "dropzone";
  itemsCell.appendChild(dropDiv);

  row.appendChild(rankCell);
  row.appendChild(itemsCell);

  table.appendChild(row);

  // очистка поля
  nameInput.value = "";

  // повторно активируем drag&drop для новой зоны
  setupDragAndDrop();
setupTierDrag();
closeModal();
}

/* -------------------- ИНИЦИАЛИЗАЦИЯ -------------------- */

document.addEventListener("DOMContentLoaded", () => {
  setupDragAndDrop();
  setupTierDrag();
});
function openModal() {
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}


const deleteZone = document.getElementById("deleteZone");

deleteZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  deleteZone.style.background = "#662222";
});

deleteZone.addEventListener("dragleave", () => {
  deleteZone.style.background = "";
});

deleteZone.addEventListener("drop", (e) => {
  e.preventDefault();

  // если перетаскивается тир
  if (draggedRow) {
    draggedRow.remove();
    draggedRow = null;
  }

  // если перетаскивается картинка
  const draggingImg = document.querySelector(".dragging");
  if (draggingImg) {
    draggingImg.remove();
  }

  deleteZone.style.background = "";
});
function uploadImages() {
  const input = document.getElementById("imageUpload");
  const files = input.files;
  const pool = document.getElementById("pool");

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.createElement("img");
      img.src = e.target.result;
      img.draggable = true;
      img.style.width = "80px";
      img.style.height = "80px";
      img.style.objectFit = "cover";

      // подключаем drag&drop для новых картинок
      img.addEventListener("dragstart", () => {
        img.classList.add("dragging");
      });
      img.addEventListener("dragend", () => {
        img.classList.remove("dragging");
      });

      pool.appendChild(img);
    };
    reader.readAsDataURL(file);
  });

  // очищаем поле после загрузки
  input.value = "";
}
function renameTier() {
  const selectedTier = document.getElementById("tierSelect").value;
  const newName = document.getElementById("newTierName").value.trim();

  if (!newName) {
    alert("Введите новое название!");
    return;
  }

  const ranks = document.querySelectorAll(".rank");

  ranks.forEach(rank => {
    if (rank.textContent.trim() === selectedTier) {
      rank.textContent = newName;

      // обновляем select: заменяем текст у нужного option
      const options = document.querySelectorAll("#tierSelect option");
      options.forEach(opt => {
        if (opt.value === selectedTier) {
          opt.textContent = newName;
          opt.value = newName;
        }
      });
    }
  });

  document.getElementById("newTierName").value = "";
}

/* --- ДОРАБОТКА addTier --- */
function addTier() {
  const nameInput = document.getElementById("tierName");
  const colorInput = document.getElementById("tierColor");
  const table = document.getElementById("tierTable");

  const tierName = nameInput.value.trim();
  const tierColor = colorInput.value;

  if (!tierName) {
    alert("Введите название тира");
    return;
  }

  const row = document.createElement("tr");
  row.height = 100;

  const rankCell = document.createElement("td");
  rankCell.className = "rank";
  rankCell.textContent = tierName;
  rankCell.style.background = tierColor;

  const itemsCell = document.createElement("td");
  const dropDiv = document.createElement("div");
  dropDiv.className = "dropzone";
  itemsCell.appendChild(dropDiv);

  row.appendChild(rankCell);
  row.appendChild(itemsCell);
  table.appendChild(row);

  // добавляем новый тир в select
  const select = document.getElementById("tierSelect");
  const option = document.createElement("option");
  option.value = tierName;
  option.textContent = tierName;
  select.appendChild(option);

  nameInput.value = "";
  setupDragAndDrop();
  setupTierDrag();
  closeModal();
}
function renameTitle() {
  const newTitle = document.getElementById("titleInput").value.trim();

  if (!newTitle) {
    alert("Введите название!");
    return;
  }

  document.getElementById("tierTitle").textContent = newTitle;

  document.getElementById("titleInput").value = "";
}
